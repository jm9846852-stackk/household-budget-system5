<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Budget Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <style>
        .card { height: 100%; }
        .table-sm { font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="d-flex justify-content-end">
        <div class="dropdown">
            <button class="btn btn-light" data-bs-toggle="dropdown">⋮</button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#" onclick="toggleHistory()">View History</a></li>
            </ul>
        </div>
    </div>

    <h4 class="text-center mb-4">Household Budget Management System</h4>

    <div class="row text-center mb-4">
        <div class="col-md-3">
            <label class="fw-bold">Total Income</label>
            <input type="number" id="income" class="form-control mt-1" placeholder="₱">
        </div>
        <div class="col-md-3">
            <label class="fw-bold">Total Spending</label>
            <input type="number" id="totalExpenses" class="form-control mt-1" disabled>
        </div>
        <div class="col-md-3">
            <label class="fw-bold">Savings (%)</label>
            <input type="number" id="savingsPercent" class="form-control mt-1" placeholder="%">
        </div>
        <div class="col-md-3">
            <label class="fw-bold">Remaining Balance</label>
            <input type="number" id="remaining" class="form-control mt-1" disabled>
        </div>
    </div>

    <div class="text-center mb-4">
        <button class="btn btn-primary px-5" onclick="saveBudget()">Save Budget Record</button>
    </div>

    <div class="row g-3" id="categoryContainer">
        <script>
            const categories = ['housing', 'utilities', 'food', 'transportation', 'education', 'health', 'subscription', 'pets'];
            const container = document.getElementById('categoryContainer');
            categories.forEach(cat => {
                container.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h6 class="text-capitalize">${cat}</h6>
                        <input id="${cat}Name" class="form-control mb-1" placeholder="Item Name">
                        <input id="${cat}Amount" type="number" class="form-control mb-1" placeholder="Amount">
                        <button class="btn btn-success btn-sm w-100 mb-2" onclick="addExpense('${cat}')">Add</button>
                        <div style="max-height: 150px; overflow-y: auto;">
                            <table class="table table-sm">
                                <tbody id="${cat}Table"></tbody>
                            </table>
                        </div>
                        <div class="mt-auto border-top pt-2">
                            <small class="fw-bold">Total: ₱ <span id="${cat}Total">0</span></small>
                        </div>
                    </div>
                </div>`;
            });
        </script>
    </div>

    <div id="historySection" style="display:none;" class="mt-5 border-top pt-4">
        <h5>Budget History</h5>
        <div class="list-group" id="historyList"></div>
    </div>
</div>

<div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title">Record Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContent">
                </div>
            <div class="modal-footer">
                <button id="editBtn" class="btn btn-warning" onclick="enableEdit()">Edit Record</button>
                <button id="saveBtn" class="btn btn-primary" onclick="saveEditedHistory()" style="display:none;">Save Changes</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
